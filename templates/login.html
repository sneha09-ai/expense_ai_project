<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container" style="max-width:400px; text-align:center;">

    <h2>🔐 Expense Tracker Login</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required
            style="padding:12px; width:80%; border-radius:8px;">
        <br><br>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required
            style="padding:12px; width:80%; border-radius:8px;">
        <br><br>

        <button type="submit">Login</button>

    </form>

    <br>

    <a href="/register">
        <button>Create New Account</button>
    </a>

</div>

</body>
</html>
